<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tlim</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0e1621;
            color: #e1e9f0;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        #app {
            width: 100%;
            height: 100vh;
            background: #17212b;
            display: flex;
            flex-direction: column;
            max-width: 100%;
            position: relative;
        }

        /* ===== LOGIN ===== */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: #17212b;
            padding: 20px;
        }
        #loginScreen h1 {
            font-size: 32px;
            color: #64b5f6;
            margin-bottom: 30px;
        }
        #loginScreen h1 .tlim-logo {
            background: #64b5f6;
            color: #0e1621;
            padding: 4px 16px;
            border-radius: 12px;
            font-size: 28px;
            font-weight: 800;
        }
        .login-box {
            background: #1f2c38;
            padding: 30px 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            background: #2b3b4a;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: 1px solid transparent;
            transition: 0.2s;
        }
        .login-box input:focus {
            outline: 1px solid #64b5f6;
            background: #1f2c38;
        }
        .login-box input::placeholder {
            color: #8e9fb1;
        }
        .login-box .btn-primary {
            width: 100%;
            padding: 14px;
            background: #64b5f6;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            color: #0e1621;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 4px;
        }
        .login-box .btn-primary:hover {
            background: #4da3e0;
        }
        .login-box .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #2b3b4a;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            color: #8e9fb1;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .login-box .btn-secondary:hover {
            background: #3a4a5a;
            color: #fff;
        }
        .error-msg { color: #f28b82; font-size: 14px; margin-top: 10px; text-align: center; }
        .success-msg { color: #7cff9e; font-size: 14px; margin-top: 10px; text-align: center; }
        .info-msg { color: #64b5f6; font-size: 13px; margin-top: 8px; text-align: center; cursor: pointer; }
        .tab-buttons { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-buttons button { flex: 1; padding: 10px; background: #1f2c38; border: none; border-radius: 12px; color: #8e9fb1; cursor: pointer; font-size: 15px; font-weight: 500; transition: 0.2s; }
        .tab-buttons button.active { background: #2b5278; color: #fff; }
        .code-display { background: #0e1621; padding: 15px; border-radius: 12px; text-align: center; margin: 15px 0; border: 2px dashed #64b5f6; }
        .code-display .code { font-size: 32px; font-weight: bold; color: #64b5f6; letter-spacing: 8px; font-family: 'Courier New', monospace; }
        .code-input-group { display: flex; gap: 10px; margin: 15px 0; }
        .code-input-group input { flex: 1; text-align: center; font-size: 24px; letter-spacing: 4px; font-family: 'Courier New', monospace; margin-bottom: 0; }
        .code-input-group button { padding: 14px 20px; background: #2b5278; border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; }
        .password-toggle { position: relative; }
        .password-toggle .toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #8e9fb1; cursor: pointer; font-size: 18px; }
        .hidden { display: none !important; }
        .copy-btn { background: #2b5278; border: none; color: #fff; padding: 4px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; margin-left: 10px; }

        /* ===== MAIN APP ===== */
        #mainApp {
            display: none;
            flex-direction: row;
            height: 100%;
            background: #17212b;
            position: relative;
        }

        /* ===== TOP HEADER (только для мобильных) ===== */
        #topHeader {
            display: none;
            background: #17212b;
            padding: 12px 16px;
            border-bottom: 1px solid #2b3b4a;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            min-height: 56px;
        }
        #topHeader .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #topHeader .header-left .tlim-title {
            font-size: 22px;
            font-weight: 800;
            color: #64b5f6;
            letter-spacing: 1px;
        }
        #topHeader .header-left .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2b5278;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
        }
        #topHeader .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #topHeader .header-right .header-btn {
            background: none;
            border: none;
            color: #8e9fb1;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
        }
        #topHeader .header-right .header-btn:hover {
            background: #1f2c38;
            color: #64b5f6;
        }

        /* ===== CHAT LIST ===== */
        #chatListContainer {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            background: #17212b;
            height: 100%;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            transition: 0.1s;
            border-bottom: 1px solid #1f2c38;
        }
        .chat-item:hover {
            background: #1f2c38;
        }
        .chat-item:active {
            background: #1f2c38;
        }
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: #fff;
            flex-shrink: 0;
            background: #2b5278;
        }
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-name {
            font-weight: 500;
            font-size: 16px;
        }
        .chat-last {
            font-size: 13px;
            color: #8e9fb1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-time {
            font-size: 11px;
            color: #8e9fb1;
            flex-shrink: 0;
        }
        .chat-badge {
            background: #64b5f6;
            color: #0e1621;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
        }
        .chat-pinned-badge {
            color: #64b5f6;
            font-size: 12px;
            margin-left: 4px;
        }

        /* ===== BOTTOM BAR (только для мобильных) ===== */
        #bottomBar {
            display: none;
            background: #17212b;
            border-top: 1px solid #2b3b4a;
            padding: 8px 16px 12px;
            justify-content: space-around;
            align-items: center;
            flex-shrink: 0;
        }
        #bottomBar .bottom-btn {
            background: none;
            border: none;
            color: #8e9fb1;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        #bottomBar .bottom-btn.active {
            color: #64b5f6;
            background: #1f2c38;
        }
        #bottomBar .bottom-btn:active {
            transform: scale(0.95);
        }
        #bottomBar .bottom-btn .btn-icon {
            font-size: 22px;
        }
        #bottomBar .bottom-btn .btn-label {
            font-size: 14px;
        }
        #bottomBar .bottom-btn.add-btn {
            background: #64b5f6;
            color: #0e1621;
            padding: 8px 20px;
            border-radius: 24px;
            font-weight: 700;
        }
        #bottomBar .bottom-btn.add-btn:active {
            transform: scale(0.95);
        }

        /* ===== CHAT VIEW ===== */
        #chatView {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0e1621;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 50;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        #chatView.open {
            display: flex;
        }

        /* Chat Header */
        #chatViewHeader {
            background: #17212b;
            padding: 10px 16px;
            border-bottom: 1px solid #2b3b4a;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            min-height: 56px;
        }
        #chatViewHeader .back-btn {
            background: none;
            border: none;
            color: #64b5f6;
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
        }
        #chatViewHeader .cv-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: #fff;
            background: #2b5278;
            flex-shrink: 0;
        }
        #chatViewHeader .cv-info {
            flex: 1;
            min-width: 0;
        }
        #chatViewHeader .cv-name {
            font-weight: 600;
            font-size: 17px;
        }
        #chatViewHeader .cv-status {
            font-size: 12px;
            color: #8e9fb1;
        }

        /* ===== PINNED BAR ===== */
        #pinnedBar {
            display: none;
            background: #1a2a3a;
            padding: 6px 16px;
            border-bottom: 1px solid #2b3b4a;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.2s;
        }
        #pinnedBar:hover {
            background: #1f3a4a;
        }
        #pinnedBar.show {
            display: flex;
        }
        #pinnedBar .pinned-icon {
            color: #64b5f6;
            font-size: 16px;
        }
        #pinnedBar .pinned-text {
            flex: 1;
            font-size: 14px;
            color: #e1e9f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #pinnedBar .pinned-text .pinned-count {
            color: #8e9fb1;
            font-size: 12px;
            margin-left: 6px;
        }
        #pinnedBar .pinned-arrow {
            color: #8e9fb1;
            font-size: 14px;
        }

        /* Messages */
        #messagesContainer {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #0e1621;
        }
        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
            position: relative;
        }
        .msg.pinned {
            border: 2px solid #64b5f6;
            background: #1a2a3a;
        }
        .msg.own {
            align-self: flex-end;
            background: #2b5278;
            border-bottom-right-radius: 4px;
        }
        .msg.other {
            align-self: flex-start;
            background: #1f2c38;
            border-bottom-left-radius: 4px;
        }
        .msg.bot {
            background: #1f3a4a;
            border-left: 3px solid #64b5f6;
        }
        .msg.system {
            background: transparent;
            text-align: center;
            align-self: center;
            color: #8e9fb1;
            font-size: 12px;
            max-width: 90%;
        }
        .msg .msg-text { font-size: 15px; line-height: 1.4; }
        .msg .msg-time { font-size: 10px; color: #8e9fb1; margin-top: 4px; text-align: right; }
        .msg video { max-width: 100%; border-radius: 12px; display: block; margin-top: 4px; max-height: 300px; }
        .msg .circle-video { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 2px solid #64b5f6; }
        .msg .file-container { background: #0e1621; border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; border: 1px solid #2b3b4a; cursor: pointer; }
        .msg .file-container .file-icon { font-size: 28px; }
        .msg .file-container .file-info { flex: 1; min-width: 0; }
        .msg .file-container .file-name { font-size: 13px; font-weight: 500; }
        .msg .file-container .file-size { font-size: 11px; color: #8e9fb1; }
        .msg .file-container .download-btn { background: #2b5278; border: none; color: #fff; padding: 4px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .msg img { max-width: 100%; border-radius: 12px; display: block; margin-top: 4px; max-height: 400px; object-fit: contain; }
        .msg .audio-container { display: flex; align-items: center; gap: 10px; background: #0e1621; padding: 6px 12px; border-radius: 20px; border: 1px solid #2b3b4a; min-width: 180px; }
        .msg .audio-container .play-btn { background: #2b5278; border: none; border-radius: 50%; width: 32px; height: 32px; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .msg .audio-container .play-btn:hover { background: #3a6b94; }
        .msg .audio-container .audio-progress { flex: 1; height: 4px; background: #2b3b4a; border-radius: 2px; cursor: pointer; position: relative; }
        .msg .audio-container .audio-progress .audio-fill { height: 100%; background: #64b5f6; border-radius: 2px; width: 0%; transition: width 0.1s; }
        .msg .audio-container .audio-time { font-size: 11px; color: #8e9fb1; min-width: 40px; text-align: center; }
        
        .msg-actions {
            display: flex;
            gap: 4px;
            position: absolute;
            top: -10px;
            right: -10px;
            opacity: 0;
            transition: 0.2s;
        }
        .msg:hover .msg-actions {
            opacity: 1;
        }
        .msg-actions button {
            background: #2b3b4a;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            cursor: pointer;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .msg-actions button:hover {
            transform: scale(1.1);
        }
        .msg-actions .pin-btn { background: #2b5278; }
        .msg-actions .pin-btn.pinned { background: #64b5f6; color: #0e1621; }
        .msg-actions .delete-btn { background: #f28b82; color: #0e1621; }
        .msg-actions .delete-btn:hover { background: #ff6b6b; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Input Row */
        #inputRow {
            display: flex;
            padding: 8px 12px 12px;
            background: #17212b;
            border-top: 1px solid #2b3b4a;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        #inputRow .input-wrapper {
            flex: 1;
            display: flex;
            gap: 6px;
            align-items: flex-end;
            background: #1f2c38;
            border-radius: 24px;
            padding: 4px 6px;
        }
        #inputRow .input-wrapper .btn-icon {
            background: none;
            border: none;
            color: #8e9fb1;
            font-size: 20px;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 50%;
            transition: 0.2s;
        }
        #inputRow .input-wrapper .btn-icon:active {
            background: #2b3b4a;
        }
        #inputRow .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 4px;
            color: #fff;
            font-size: 15px;
            outline: none;
            min-width: 60px;
        }
        #inputRow .input-wrapper input::placeholder {
            color: #6b7f8f;
        }
        #inputRow .btn-send {
            background: #64b5f6;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            color: #0e1621;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        #inputRow .btn-send:active {
            transform: scale(0.95);
        }
        #inputRow .btn-send.recording {
            background: #f28b82;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Voice record bar */
        #voiceRecordBar {
            display: none;
            background: #1f2c38;
            padding: 8px 16px;
            border-top: 1px solid #2b3b4a;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        #voiceRecordBar.show { display: flex; }
        #voiceRecordBar .voice-timer {
            color: #f28b82;
            font-weight: bold;
            font-size: 16px;
            min-width: 60px;
        }
        #voiceRecordBar .voice-wave {
            flex: 1;
            height: 30px;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        #voiceRecordBar .voice-wave span {
            display: block;
            width: 4px;
            background: #64b5f6;
            border-radius: 2px;
            animation: wave 0.5s infinite alternate;
        }
        @keyframes wave {
            0% { height: 5px; }
            100% { height: 25px; }
        }
        #voiceRecordBar .voice-cancel-btn {
            background: none;
            border: none;
            color: #f28b82;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
        }
        #voiceRecordBar .voice-send-btn {
            background: #64b5f6;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: #0e1621;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* File preview bar */
        #filePreviewBar {
            display: none;
            background: #1f2c38;
            padding: 6px 16px;
            border-top: 1px solid #2b3b4a;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        #filePreviewBar.show { display: flex; }
        #filePreviewBar .file-preview-info { flex: 1; display: flex; align-items: center; gap: 8px; }
        #filePreviewBar .file-preview-info .file-icon { font-size: 20px; }
        #filePreviewBar .file-preview-info .file-name { font-size: 13px; color: #e1e9f0; }
        #filePreviewBar .file-preview-info .file-size { font-size: 11px; color: #8e9fb1; }
        #filePreviewBar .remove-file-btn { background: none; border: none; color: #f28b82; font-size: 18px; cursor: pointer; padding: 0 8px; }

        /* Circle recorder */
        #circleRecorder {
            display: none;
            padding: 10px;
            background: #0e1621;
            border-top: 1px solid #2b3b4a;
            flex-shrink: 0;
        }
        #circleRecorder video { width: 100%; border-radius: 16px; max-height: 200px; background: #000; }
        #circleRecorder .record-controls { display: flex; gap: 10px; margin-top: 8px; }
        #circleRecorder .record-controls button { flex: 1; padding: 10px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        #circleRecorder .record-controls .btn-record { background: #f28b82; color: #0e1621; }
        #circleRecorder .record-controls .btn-stop { background: #64b5f6; color: #0e1621; }
        #circleRecorder .record-controls .btn-secondary { background: #2b3b4a; color: #fff; }
        #circleTimer { color: #64b5f6; font-weight: bold; text-align: center; margin-top: 6px; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #17212b;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            color: #e1e9f0;
        }
        .modal h2 { margin-bottom: 16px; font-size: 20px; }
        .modal input { width: 100%; padding: 12px 16px; margin-bottom: 12px; background: #1f2c38; border: none; border-radius: 12px; color: #fff; font-size: 15px; outline: 1px solid transparent; }
        .modal input:focus { outline: 1px solid #64b5f6; }
        .modal .btn-primary { width: 100%; padding: 14px; background: #64b5f6; border: none; border-radius: 12px; font-weight: 600; color: #0e1621; cursor: pointer; font-size: 16px; }
        .modal .btn-secondary { background: #2b3b4a; color: #fff; margin-top: 8px; }
        .modal .close-modal { float: right; background: none; border: none; color: #8e9fb1; font-size: 24px; cursor: pointer; }
        .modal .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; max-height: 150px; overflow-y: auto; }
        .modal .checkbox-group label { display: flex; align-items: center; gap: 6px; background: #1f2c38; padding: 4px 12px; border-radius: 16px; font-size: 13px; cursor: pointer; }
        .user-search-result { padding: 8px 12px; background: #1f2c38; margin: 4px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .user-search-result:active { background: #2b3b4a; }
        .user-search-result .add-btn { background: #2b5278; border: none; color: #fff; padding: 4px 12px; border-radius: 12px; cursor: pointer; }
        .selected-users { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .selected-users .user-tag { background: #2b5278; padding: 4px 12px; border-radius: 16px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .selected-users .user-tag .remove-btn { background: none; border: none; color: #f28b82; cursor: pointer; font-size: 14px; padding: 0 4px; }
        .file-input-hidden { display: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2b5278; border-radius: 4px; }

        /* ===== АДАПТИВНОСТЬ ===== */
        /* МОБИЛЬНЫЙ РЕЖИМ (по умолчанию) */
        #mainApp {
            flex-direction: column !important;
        }
        #topHeader {
            display: flex !important;
        }
        #bottomBar {
            display: flex !important;
        }
        #chatListContainer {
            flex: 1 !important;
            width: 100% !important;
            border-right: none !important;
        }
        #chatView {
            display: none;
        }
        #chatView.open {
            display: flex;
        }
        .desktop-only {
            display: none !important;
        }

        /* ДЕСКТОПНЫЙ РЕЖИМ */
        @media (min-width: 769px) and (pointer: fine) {
            #mainApp {
                flex-direction: row !important;
            }
            #topHeader {
                display: none !important;
            }
            #bottomBar {
                display: none !important;
            }
            #chatListContainer {
                flex: none !important;
                width: 300px !important;
                min-width: 300px !important;
                border-right: 1px solid #2b3b4a !important;
                height: 100% !important;
            }
            #chatView {
                position: relative !important;
                display: flex !important;
                animation: none !important;
                flex: 1 !important;
            }
            #chatView .back-btn {
                display: none !important;
            }
            #chatViewHeader {
                min-height: 64px;
            }
            .desktop-only {
                display: block !important;
            }
        }

        @media (max-width: 768px) {
            #topHeader .header-left .tlim-title { font-size: 18px; }
            #bottomBar .bottom-btn .btn-label { font-size: 12px; }
            #bottomBar .bottom-btn { padding: 6px 12px; font-size: 16px; }
            #bottomBar { padding: 6px 12px 10px; }
            .chat-avatar { width: 42px; height: 42px; font-size: 16px; }
            .chat-name { font-size: 14px; }
            .msg { max-width: 85%; padding: 8px 12px; }
            .msg .msg-text { font-size: 14px; }
            #chatViewHeader { padding: 8px 12px; min-height: 48px; }
            #chatViewHeader .cv-name { font-size: 15px; }
            #inputRow { padding: 6px 10px 10px; }
            #inputRow .input-wrapper input { font-size: 14px; }
            #inputRow .btn-send { width: 38px; height: 38px; font-size: 16px; }
            #pinnedBar { padding: 4px 12px; }
            #pinnedBar .pinned-text { font-size: 12px; }
        }
        @media (max-width: 400px) {
            #topHeader .header-left .tlim-title { font-size: 16px; }
            #bottomBar .bottom-btn .btn-label { display: none; }
            #bottomBar .bottom-btn { padding: 8px 14px; }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- LOGIN -->
    <div id="loginScreen">
        <h1><span class="tlim-logo">Tlim</span></h1>
        <div class="login-box">
            <div class="tab-buttons">
                <button class="active" id="tabPassword">🔑 Пароль</button>
                <button id="tabCode">📧 Регистрация</button>
            </div>
            <div id="passwordForm">
                <input type="text" id="loginUsername" placeholder="Имя пользователя" />
                <div class="password-toggle">
                    <input type="password" id="loginPassword" placeholder="Пароль" />
                    <button class="toggle-btn" id="togglePassword">👁️</button>
                </div>
                <button class="btn-primary" id="loginPasswordBtn">Войти</button>
                <div id="loginError" class="error-msg hidden"></div>
                <div class="info-msg" id="forgotPasswordLink">Нет аккаунта? Зарегистрироваться</div>
            </div>
            <div id="codeForm" style="display:none;">
                <input type="text" id="regUsername" placeholder="Имя пользователя" />
                <input type="email" id="regEmail" placeholder="Почта @yandex.ru" />
                <div class="password-toggle">
                    <input type="password" id="regPassword" placeholder="Пароль" />
                    <button class="toggle-btn" id="toggleRegPassword">👁️</button>
                </div>
                <button class="btn-primary" id="registerBtn">📧 Зарегистрироваться</button>
                <div id="codeError" class="error-msg hidden"></div>
                <div id="codeSuccess" class="success-msg hidden"></div>
                <div id="verifySection" style="display:none; margin-top:15px;">
                    <p style="color:#8e9fb1;margin-bottom:10px;">📧 Код отправлен на почту</p>
                    <div class="code-display">
                        <div class="code" id="displayCode">------</div>
                        <button class="copy-btn" id="copyCodeBtn">📋 Скопировать</button>
                    </div>
                    <div class="code-input-group">
                        <input type="text" id="verifyCode" placeholder="Код" maxlength="6" />
                        <button id="verifyBtn">✅</button>
                    </div>
                    <button id="resendCodeBtn" class="btn-secondary">🔄 Отправить повторно</button>
                    <div id="verifyError" class="error-msg hidden"></div>
                    <div class="info-msg" id="backToPasswordLink">← Уже есть аккаунт?</div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp">
        <!-- Верхний заголовок (только для мобильных) -->
        <div id="topHeader">
            <div class="header-left">
                <div class="user-avatar" id="userAvatar">U</div>
                <span class="tlim-title">Tlim</span>
            </div>
            <div class="header-right">
                <button class="header-btn" id="logoutBtn" title="Выйти">⏻</button>
            </div>
        </div>

        <!-- Список чатов (слева на десктопе, на весь экран на мобильных) -->
        <div id="chatListContainer">
            <div id="chatList"></div>
        </div>

        <!-- Нижняя панель (только для мобильных) -->
        <div id="bottomBar">
            <button class="bottom-btn active" id="chatsBtn">
                <span class="btn-icon">💬</span>
                <span class="btn-label">Чаты</span>
            </button>
            <button class="bottom-btn add-btn" id="addBtn">
                <span>➕</span>
            </button>
        </div>

        <!-- Окно чата (справа на десктопе, на весь экран на мобильных) -->
        <div id="chatView">
            <div id="chatViewHeader">
                <button class="back-btn" id="backBtn">←</button>
                <div class="cv-avatar" id="cvAvatar">C</div>
                <div class="cv-info">
                    <div class="cv-name" id="cvName">Чат</div>
                    <div class="cv-status" id="cvStatus">онлайн</div>
                </div>
            </div>

            <div id="pinnedBar">
                <span class="pinned-icon">📌</span>
                <span class="pinned-text" id="pinnedText">Закреплённые сообщения</span>
                <span class="pinned-arrow">↓</span>
            </div>

            <div id="messagesContainer"></div>

            <div id="filePreviewBar">
                <div class="file-preview-info">
                    <span class="file-icon" id="filePreviewIcon">📄</span>
                    <div>
                        <div class="file-name" id="filePreviewName">file.txt</div>
                        <div class="file-size" id="filePreviewSize">0 KB</div>
                    </div>
                </div>
                <button class="remove-file-btn" id="removeFileBtn">✕</button>
            </div>

            <div id="voiceRecordBar">
                <span class="voice-timer" id="voiceTimer">0:00</span>
                <div class="voice-wave" id="voiceWave">
                    <span style="animation-delay:0.0s"></span>
                    <span style="animation-delay:0.1s"></span>
                    <span style="animation-delay:0.2s"></span>
                    <span style="animation-delay:0.3s"></span>
                    <span style="animation-delay:0.4s"></span>
                    <span style="animation-delay:0.5s"></span>
                    <span style="animation-delay:0.6s"></span>
                    <span style="animation-delay:0.7s"></span>
                    <span style="animation-delay:0.8s"></span>
                    <span style="animation-delay:0.9s"></span>
                </div>
                <button class="voice-cancel-btn" id="voiceCancelBtn">✕</button>
                <button class="voice-send-btn" id="voiceSendBtn">➤</button>
            </div>

            <div id="circleRecorder">
                <video id="circlePreview" autoplay muted></video>
                <div class="record-controls">
                    <button id="circleStartBtn" class="btn-record">🔴 Записать</button>
                    <button id="circleStopBtn" class="btn-stop" disabled>⏹ Стоп</button>
                    <button id="circleCancelBtn" class="btn-secondary">Отмена</button>
                </div>
                <div id="circleTimer">0 сек</div>
            </div>

            <div id="inputRow">
                <div class="input-wrapper">
                    <button class="btn-icon" id="cameraBtn" title="Фото">📷</button>
                    <button class="btn-icon" id="fileBtn" title="Файл">📎</button>
                    <button class="btn-icon" id="videoBtn" title="Видео">🎥</button>
                    <button class="btn-icon" id="circleBtn" title="Кружок">⭕</button>
                    <button class="btn-icon" id="voiceBtn" title="Голосовое">🎤</button>
                    <input type="text" id="messageInput" placeholder="Сообщение..." />
                </div>
                <button class="btn-send" id="sendBtn">➤</button>
            </div>
        </div>

        <input type="file" id="fileInput" class="file-input-hidden" />
        <input type="file" id="videoFileInput" accept="video/*" class="file-input-hidden" />
        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="file-input-hidden" />
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <button class="close-modal" id="modalClose">✕</button>
            <h2 id="modalTitle">Создать</h2>
            <div id="modalBody"></div>
        </div>
    </div>
</div>

<script>
    // ======== SIMPLE BOT ========
    class SimpleBot {
        constructor() {
            this.userName = '';
        }
        setUserName(name) {
            this.userName = name;
        }
        getResponse(message) {
            const msg = message.toLowerCase();
            const name = this.userName || 'Пользователь';

            if (msg.match(/^(привет|здравствуй|хай|hi|hello|ку|салют)/)) {
                return `Привет, ${name}! 👋 Рад тебя видеть!`;
            }
            if (msg.match(/^(как дела|как жизнь|как ты)/)) {
                return `У меня всё отлично! 😊 А как твои дела, ${name}?`;
            }
            if (msg.match(/(спасибо|благодарю)/)) {
                return `Пожалуйста! 😊 Всегда рад помочь!`;
            }
            if (msg.match(/(время|час|дата)/)) {
                const now = new Date();
                return `🕐 Сейчас ${now.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' })}`;
            }
            if (msg.match(/(кто ты|ты кто|бот)/)) {
                return `🤖 Я — бот Tlim! Простой помощник для общения.`;
            }
            if (msg.match(/(анекдот|шутка|смешное)/)) {
                return '— Доктор, я плохо себя чувствую!\n— А вы реже в зеркало смотрите! 😂';
            }
            if (msg.match(/(пока|до свидания|bye)/)) {
                return `До свидания, ${name}! 👋 Было приятно пообщаться!`;
            }
            return `Интересно, ${name}! 🤔 Расскажи ещё что-нибудь.`;
        }
    }

    // ======== STATE ========
    let state = {
        user: null,
        chats: [],
        folders: [],
        currentChatId: null,
        allUsers: [],
        pendingUser: null,
        pendingCode: null,
        circleStream: null,
        circleRecorder: null,
        circleChunks: [],
        circleTimer: null,
        circleSeconds: 0,
        bot: new SimpleBot(),
        botChatId: null,
        pendingFile: null,
        // Voice
        mediaRecorder: null,
        audioChunks: [],
        isRecording: false,
        recordingStartTime: null,
        recordingTimer: null,
        recordingSeconds: 0,
    };

    // ======== LOAD/SAVE ========
    function loadState() {
        try {
            const saved = localStorage.getItem('tlimState');
            if (saved) {
                const parsed = JSON.parse(saved);
                state.user = parsed.user || null;
                state.chats = parsed.chats || [];
                state.folders = parsed.folders || [];
                state.currentChatId = parsed.currentChatId || null;
                state.botChatId = parsed.botChatId || null;
                state.allUsers = parsed.allUsers || [];
                state.chats = state.chats.map(c => ({ ...c, folderId: c.folderId || null, pinnedMessages: c.pinnedMessages || [] }));
                if (state.bot) {
                    state.bot.setUserName(state.user?.name || 'Пользователь');
                }
            }
        } catch(e) { console.warn('Load error', e); }
    }

    function saveState() {
        try {
            const toSave = {
                user: state.user,
                chats: state.chats,
                folders: state.folders,
                currentChatId: state.currentChatId,
                botChatId: state.botChatId,
                allUsers: state.allUsers,
            };
            localStorage.setItem('tlimState', JSON.stringify(toSave));
        } catch(e) { console.warn('Save error', e); }
    }

    // ======== HELPERS ========
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substring(2,6); }
    function getChat(id) { return state.chats.find(c => c.id === id); }
    function getChatsForDisplay() { return state.chats; }
    function getChatName(chat) {
        if (chat.type === 'channel') return '📢 ' + chat.name;
        if (chat.type === 'group') return '👥 ' + chat.name;
        if (chat.isBot) return '🤖 ' + chat.name;
        return chat.name;
    }
    function getChatAvatar(chat) {
        if (chat.avatar) return chat.avatar;
        if (chat.isBot) return '🤖';
        if (chat.type === 'channel') return '📢';
        return chat.name ? chat.name.charAt(0).toUpperCase() : '?';
    }
    function formatTime(ts) {
        const d = new Date(ts);
        return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }
    function isBotChat(chat) { return chat && chat.isBot === true; }
    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    function getFileIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const icons = {
            'pdf': '📄', 'doc': '📄', 'txt': '📄',
            'xls': '📊', 'csv': '📊',
            'zip': '📦', 'rar': '📦',
            'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️', 'webp': '🖼️',
            'mp3': '🎵', 'wav': '🎵',
            'mp4': '🎬', 'avi': '🎬', 'mkv': '🎬',
            'exe': '⚙️', 'apk': '📱',
            'json': '📋', 'html': '📋', 'css': '📋', 'js': '📋',
        };
        return icons[ext] || '📎';
    }
    function formatDuration(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return m + ':' + (s < 10 ? '0' : '') + s;
    }

    // ======== BOT INIT ========
    function initBot() {
        if (!state.botChatId) {
            const botChat = {
                id: generateId(),
                type: 'chat',
                name: 'Tlim Bot',
                avatar: '🤖',
                avatarColor: '#1a5276',
                participants: ['bot'],
                messages: [{ 
                    id: 'bot_welcome', 
                    sender: 'bot', 
                    text: '👋 Привет! Я бот Tlim. Просто напиши мне что-нибудь!', 
                    time: Date.now(),
                    isBot: true
                }],
                folderId: null,
                isBot: true,
                pinnedMessages: [],
            };
            state.chats.push(botChat);
            state.botChatId = botChat.id;
        }
        state.bot.setUserName(state.user?.name || 'Пользователь');
        saveState();
    }

    // ======== RENDER ========
    function renderChatList() {
        const container = document.getElementById('chatList');
        let list = getChatsForDisplay();
        list.sort((a,b) => {
            const ta = a.messages && a.messages.length ? a.messages[a.messages.length-1].time : 0;
            const tb = b.messages && b.messages.length ? b.messages[b.messages.length-1].time : 0;
            return tb - ta;
        });
        container.innerHTML = '';
        if (!list.length) {
            container.innerHTML = '<div style="color:#8e9fb1;text-align:center;padding:40px 20px;">Нет чатов\nНажмите + чтобы создать</div>';
            return;
        }
        list.forEach(chat => {
            const div = document.createElement('div');
            div.className = 'chat-item';
            const lastMsg = chat.messages && chat.messages.length ? chat.messages[chat.messages.length-1] : null;
            let lastText = 'Нет сообщений';
            let lastTime = '';
            if (lastMsg) {
                if (lastMsg.isBot) lastText = '🤖 ' + (lastMsg.text || '');
                else if (lastMsg.text) lastText = lastMsg.text;
                else if (lastMsg.video) lastText = '🎥 Видео';
                else if (lastMsg.isCircle) lastText = '⭕ Кружок';
                else if (lastMsg.isSystem) lastText = '📌 ' + lastMsg.text;
                else if (lastMsg.file) lastText = '📎 ' + (lastMsg.file.name || 'Файл');
                else if (lastMsg.audio) lastText = '🎤 Голосовое';
                lastTime = formatTime(lastMsg.time);
                if (lastText.length > 30) lastText = lastText.substring(0, 30) + '...';
            }
            const avatar = getChatAvatar(chat);
            const pinnedCount = (chat.pinnedMessages || []).length;
            div.innerHTML = `
                <div class="chat-avatar" style="background:${chat.avatarColor || '#2b5278'}">${avatar}</div>
                <div class="chat-info">
                    <div class="chat-name">${getChatName(chat)} ${pinnedCount > 0 ? '<span class="chat-pinned-badge">📌' + pinnedCount + '</span>' : ''}</div>
                    <div class="chat-last">${lastText}</div>
                </div>
                ${lastTime ? `<div class="chat-time">${lastTime}</div>` : ''}
                ${chat.unread ? `<span class="chat-badge">${chat.unread}</span>` : ''}
            `;
            div.dataset.id = chat.id;
            div.addEventListener('click', () => {
                openChat(chat.id);
            });
            container.appendChild(div);
        });
    }

    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        const chat = getChat(state.currentChatId);
        if (!chat) {
            container.innerHTML = '';
            return;
        }
        
        const scrollPos = container.scrollTop;
        container.innerHTML = '';
        
        (chat.messages || []).forEach(msg => {
            const isPinned = (chat.pinnedMessages || []).includes(msg.id);
            const div = createMessageElement(chat, msg, isPinned);
            container.appendChild(div);
        });
        
        container.scrollTop = scrollPos;
        updatePinnedBar(chat);
    }

    function createMessageElement(chat, msg, isPinned) {
        const div = document.createElement('div');
        let isOwn = msg.sender === state.user?.id;
        let isBot = msg.isBot || msg.sender === 'bot';
        let isSystem = msg.isSystem || msg.sender === 'system';
        
        div.className = 'msg';
        if (isOwn) div.classList.add('own');
        else if (isBot) div.classList.add('bot');
        else div.classList.add('other');
        if (isSystem) div.classList.add('system');
        if (isPinned) {
            div.classList.add('pinned');
            div.dataset.pinned = 'true';
        }
        div.dataset.msgId = msg.id;
        
        let content = '';
        
        // Аудио
        if (msg.audio && msg.audio.data) {
            content += `
                <div class="audio-container" data-audio="${msg.audio.data}">
                    <button class="play-btn">▶</button>
                    <div class="audio-progress">
                        <div class="audio-fill"></div>
                    </div>
                    <span class="audio-time">${formatDuration(msg.audio.duration || 0)}</span>
                </div>
            `;
            if (msg.text) content += `<div class="msg-text" style="margin-top:4px;">${msg.text}</div>`;
        } else if (msg.file && msg.file.data) {
            const icon = getFileIcon(msg.file.name);
            const isImage = msg.file.type && msg.file.type.startsWith('image/');
            if (isImage) {
                content += `<img src="${msg.file.data}" alt="${msg.file.name}" />`;
            }
            content += `
                <div class="file-container" data-file="${msg.file.data}" data-filename="${msg.file.name}">
                    <span class="file-icon">${icon}</span>
                    <div class="file-info">
                        <div class="file-name">${msg.file.name}</div>
                        <div class="file-size">${formatFileSize(msg.file.size)}</div>
                    </div>
                    <button class="download-btn" data-file="${msg.file.data}" data-filename="${msg.file.name}">⬇</button>
                </div>
            `;
            if (msg.text) content += `<div class="msg-text" style="margin-top:4px;">${msg.text}</div>`;
        } else if (msg.video) {
            if (msg.isCircle) {
                content += `<video class="circle-video" src="${msg.video}" controls loop></video>`;
            } else {
                content += `<video src="${msg.video}" controls></video>`;
            }
            if (msg.text) content += `<div class="msg-text" style="margin-top:4px;">${msg.text}</div>`;
        } else {
            content = `<div class="msg-text">${msg.text || ''}</div>`;
        }
        
        if (isSystem) {
            content = `<div class="msg-text">📌 ${msg.text}</div>`;
        }
        
        if (!isSystem && isOwn) {
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'msg-actions';
            
            const pinBtn = document.createElement('button');
            pinBtn.className = 'pin-btn' + (isPinned ? ' pinned' : '');
            pinBtn.textContent = '📌';
            pinBtn.title = isPinned ? 'Открепить' : 'Закрепить';
            pinBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePinMessage(chat.id, msg.id);
            });
            actionsDiv.appendChild(pinBtn);
            
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = '✕';
            deleteBtn.title = 'Удалить';
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm('Удалить сообщение?')) {
                    deleteMessage(chat.id, msg.id);
                }
            });
            actionsDiv.appendChild(deleteBtn);
            
            div.appendChild(actionsDiv);
        }
        
        const contentDiv = document.createElement('div');
        contentDiv.innerHTML = content + `<div class="msg-time">${formatTime(msg.time)}</div>`;
        div.appendChild(contentDiv.firstChild);
        div.appendChild(contentDiv.lastChild);
        
        // Обработчики аудио
        div.querySelectorAll('.audio-container').forEach(el => {
            const audioData = el.dataset.audio;
            const playBtn = el.querySelector('.play-btn');
            const progressFill = el.querySelector('.audio-fill');
            const timeEl = el.querySelector('.audio-time');
            let audio = null;
            let isPlaying = false;
            
            playBtn.addEventListener('click', () => {
                if (!audio) {
                    audio = new Audio(audioData);
                    audio.addEventListener('timeupdate', () => {
                        const percent = (audio.currentTime / audio.duration) * 100;
                        progressFill.style.width = percent + '%';
                        timeEl.textContent = formatDuration(audio.currentTime);
                    });
                    audio.addEventListener('ended', () => {
                        isPlaying = false;
                        playBtn.textContent = '▶';
                        progressFill.style.width = '0%';
                        timeEl.textContent = formatDuration(msg.audio.duration || 0);
                    });
                }
                
                if (isPlaying) {
                    audio.pause();
                    playBtn.textContent = '▶';
                    isPlaying = false;
                } else {
                    audio.play();
                    playBtn.textContent = '⏸';
                    isPlaying = true;
                }
            });
            
            // Клик по прогрессу
            const progressBar = el.querySelector('.audio-progress');
            progressBar.addEventListener('click', (e) => {
                if (!audio) return;
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
            });
        });
        
        div.querySelectorAll('.file-container').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('download-btn')) return;
                const data = el.dataset.file;
                const name = el.dataset.filename || 'file';
                downloadFile(data, name);
            });
        });
        
        div.querySelectorAll('.download-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                downloadFile(btn.dataset.file, btn.dataset.filename || 'file');
                btn.textContent = '✅';
                setTimeout(() => { btn.textContent = '⬇'; }, 1500);
            });
        });
        
        return div;
    }

    function togglePinMessage(chatId, msgId) {
        const chat = getChat(chatId);
        if (!chat) return;
        if (!chat.pinnedMessages) chat.pinnedMessages = [];
        
        const index = chat.pinnedMessages.indexOf(msgId);
        if (index > -1) {
            chat.pinnedMessages.splice(index, 1);
        } else {
            chat.pinnedMessages.push(msgId);
        }
        saveState();
        renderMessages();
        renderChatList();

    function deleteMessage(chatId, msgId) {
        const chat = getChat(chatId);
        if (chat) {
            chat.messages = chat.messages.filter(m => m.id !== msgId);
            if (chat.pinnedMessages) {
                chat.pinnedMessages = chat.pinnedMessages.filter(id => id !== msgId);
            }
            saveState();
            renderMessages();
            renderChatList();
        }
    }

            document.body.removeChild(link);

    // ======== MESSAGING ========
    function sendMessage(text, videoData, isCircle, fileData, audioData) {
        const chat = getChat(state.currentChatId);
        if (!chat) return;
        if (!text && !videoData && !fileData && !audioData) return;
        
        const msg = {
            id: generateId(),
            sender: state.user.id,
            text: text || '',
            video: videoData || null,
            isCircle: isCircle || false,
            file: fileData || null,
            audio: audioData || null,
            time: Date.now(),
            isBot: false,
            isSystem: false,
        };
        if (!chat.messages) chat.messages = [];
        chat.messages.push(msg);
        renderMessages();
        saveState();
        renderChatList();

        if (isBotChat(chat) && text) {
            processBotResponse(chat, text);
        }
    }

    function processBotResponse(chat, userMessage) {
        const typingMsg = {
            id: 'typing_' + Date.now(),
            sender: 'bot',
            text: '🤖 печатает...',
            time: Date.now(),
            isBot: true,
            isTyping: true,
        };
        chat.messages.push(typingMsg);
        renderMessages();
        saveState();

        const delay = 500 + Math.random() * 1000;
        setTimeout(() => {
            chat.messages = chat.messages.filter(m => !m.isTyping);
            const response = state.bot.getResponse(userMessage);
            const botMsg = {
                id: generateId(),
                sender: 'bot',
                text: response,
                time: Date.now(),
                isBot: true,
                isSystem: false,
            };
            chat.messages.push(botMsg);
            renderMessages();
            saveState();
            renderChatList();
        }, delay);
    }

    // ======== CREATE CHAT ========
    function createChat(type, name, participants, participantNames) {
        const existing = state.chats.find(c => c.name === name && c.type === type);
        if (existing) {
            alert('Чат с таким названием уже существует!');
            return false;
        }

        const newChat = {
            id: generateId(),
            type: type,
            name: name,
            avatar: name.charAt(0).toUpperCase(),
            avatarColor: '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'),
            participants: participants || [state.user.id],
            participantNames: participantNames || [],
            messages: [],
            pinnedMessages: [],
            folderId: null,
            unread: 0,
            isBot: false,
            isOwner: true,
            created: Date.now(),
        };
        
        if (type === 'group') {
            if (!newChat.participants.includes(state.user.id)) newChat.participants.push(state.user.id);
            if (!newChat.participantNames.includes(state.user.name)) newChat.participantNames.push(state.user.name);
            newChat.messages.push({
                id: generateId(),
                sender: 'system',
                text: `👥 Группа "${name}" создана!\nУчастники: ${newChat.participantNames.join(', ')}`,
                time: Date.now(),
                isSystem: true
            });
        }
        if (type === 'channel') {
            newChat.messages.push({
                id: generateId(),
                sender: 'system',
                text: `📢 Канал "${name}" создан!`,
                time: Date.now(),
                isSystem: true
            });
        }
        
        state.chats.push(newChat);
        state.currentChatId = newChat.id;
        saveState();
        renderAll();
        openChat(newChat.id);
        return true;
    }

    // ======== VOICE RECORDING ========
    function startVoiceRecording() {
        if (state.isRecording) return;
        
        const voiceBar = document.getElementById('voiceRecordBar');
        const sendBtn = document.getElementById('sendBtn');
        
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                state.mediaRecorder = new MediaRecorder(stream);
                state.audioChunks = [];
                state.isRecording = true;
                state.recordingSeconds = 0;
                state.recordingStartTime = Date.now();
                
                state.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) state.audioChunks.push(e.data);
                };
                
                state.mediaRecorder.onstop = () => {
                    const blob = new Blob(state.audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const audioData = {
                            data: ev.target.result,
                            duration: state.recordingSeconds,
                        };
                        sendMessage(null, null, false, null, audioData);
                        state.audioChunks = [];
                        state.isRecording = false;
                        voiceBar.classList.remove('show');
                        sendBtn.classList.remove('recording');
                        document.getElementById('voiceTimer').textContent = '0:00';
                        clearInterval(state.recordingTimer);
                        stream.getTracks().forEach(t => t.stop());
                    };
                    reader.readAsDataURL(blob);
                };
                
                state.mediaRecorder.start();
                voiceBar.classList.add('show');
                sendBtn.classList.add('recording');
                
                clearInterval(state.recordingTimer);
                state.recordingTimer = setInterval(() => {
                    state.recordingSeconds++;
                    document.getElementById('voiceTimer').textContent = formatDuration(state.recordingSeconds);
                }, 1000);
            })
            .catch(err => {
                alert('❌ Ошибка доступа к микрофону: ' + err.message);
            });
    }

    function stopVoiceRecording() {
        if (state.mediaRecorder && state.isRecording) {
            state.mediaRecorder.stop();
        }
    }

    function cancelVoiceRecording() {
        if (state.mediaRecorder && state.isRecording) {
            state.mediaRecorder.stop();
            state.audioChunks = [];
            state.isRecording = false;
            document.getElementById('voiceRecordBar').classList.remove('show');
            document.getElementById('sendBtn').classList.remove('recording');
            document.getElementById('voiceTimer').textContent = '0:00';
            clearInterval(state.recordingTimer);
        }
    }

        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();

            errorEl.textContent = 'Имя минимум 3 символа';

        }

            errorEl.classList.remove('hidden');
            return;
        }

        const existing = state.allUsers.find(u => u.name === name || u.email === email);

        errorEl.classList.add('hidden');

            password: password,
            avatarColor: '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'),
            registered: Date.now()

    function startCircleRecording() {
        const preview = document.getElementById('circlePreview');
        const recorderDiv = document.getElementById('circleRecorder');
        const startBtn = document.getElementById('circleStartBtn');
        const stopBtn = document.getElementById('circleStopBtn');
        const timerEl = document.getElementById('circleTimer');

        recorderDiv.style.display = 'block';
        document.getElementById('inputRow').style.display = 'none';

        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                state.circleStream = stream;
                preview.srcObject = stream;
                preview.play();
                startBtn.disabled = false;
                stopBtn.disabled = true;
                timerEl.textContent = '0 сек';
                state.circleSeconds = 0;
                state.circleChunks = [];

                startBtn.onclick = () => {
                    if (!state.circleStream) return;
                    state.circleChunks = [];
                    const recorder = new MediaRecorder(state.circleStream, { mimeType: 'video/webm' });
                    state.circleRecorder = recorder;
                    recorder.ondataavailable = (e) => {
                        if (e.data.size > 0) state.circleChunks.push(e.data);
                    };
                    recorder.onstop = () => {
                        const blob = new Blob(state.circleChunks, { type: 'video/webm' });
                        if (blob.size > 0) {
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                sendMessage(null, ev.target.result, true, null, null);
                                closeCircleRecorder();
                            };
                            reader.readAsDataURL(blob);
                        } else {
                            alert('Запись не удалась');
                            closeCircleRecorder();
                        }
                        state.circleChunks = [];
                    };
                    recorder.start(1000);
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    state.circleSeconds = 0;
                    clearInterval(state.circleTimer);
                    state.circleTimer = setInterval(() => {
                        state.circleSeconds++;
                        timerEl.textContent = state.circleSeconds + ' сек';
                        if (state.circleSeconds >= 5) stopCircleRecording();
                    }, 1000);
                };

                stopBtn.onclick = stopCircleRecording;
                document.getElementById('circleCancelBtn').onclick = closeCircleRecorder;
            })
            .catch(err => {
                alert('❌ Ошибка доступа к камере: ' + err.message);
                closeCircleRecorder();
            });
    }

    function stopCircleRecording() {
        if (state.circleRecorder && state.circleRecorder.state !== 'inactive') {
            state.circleRecorder.stop();
        }
        clearInterval(state.circleTimer);
        document.getElementById('circleTimer').textContent = '⏹';
    }

    function closeCircleRecorder() {
        clearInterval(state.circleTimer);
        if (state.circleStream) {
            state.circleStream.getTracks().forEach(t => t.stop());
            state.circleStream = null;
        }
        if (state.circleRecorder) {
            try { state.circleRecorder.stop(); } catch(e) {}
            state.circleRecorder = null;
        }
        document.getElementById('circleRecorder').style.display = 'none';
        document.getElementById('inputRow').style.display = 'flex';
        document.getElementById('circlePreview').srcObject = null;
        state.circleChunks = [];
    }

                    </div>
                `).join('');

            const selectedHtml = selectedUsers.map(u => `
                <span class="user-tag">
                    ${u.name}
                    <button class="remove-btn" data-id="${u.id}">×</button>
                </span>
            `).join('');

            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <input type="text" id="groupName" placeholder="Название группы" />
                <div style="color:#8e9fb1;font-size:13px;margin:8px 0;">👥 Выберите участников:</div>
                <input type="text" id="searchUsersInput" placeholder="Поиск..." />
                <div id="searchResults" style="max-height:120px;overflow-y:auto;margin:6px 0;"></div>
                <div class="selected-users" id="selectedUsers">${selectedHtml}</div>
                <button class="btn-primary" id="confirmGroupBtn">Создать (${selectedUsers.length} уч.)</button>
            `;

            const resultsDiv = document.getElementById('searchResults');
            const searchInput = document.getElementById('searchUsersInput');
            
            function updateSearch() {
                const query = searchInput.value.trim();
                let results = state.allUsers.filter(u => u.id !== state.user.id);
                if (query) results = results.filter(u => u.name.toLowerCase().includes(query.toLowerCase()));
                results = results.filter(u => !selectedUsers.find(s => s.id === u.id));
                
                if (!results.length) {
                    resultsDiv.innerHTML = '<div style="color:#8e9fb1;padding:6px;">Никого не найдено</div>';
                } else {
                    resultsDiv.innerHTML = results.map(u => `
                        <div class="user-search-result" data-id="${u.id}">
                            <span>👤 ${u.name}</span>
                            <button class="add-btn" data-id="${u.id}">+</button>
                        </div>
                    `).join('');
                    resultsDiv.querySelectorAll('.add-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const user = state.allUsers.find(u => u.id === btn.dataset.id);
                            if (user && !selectedUsers.find(s => s.id === user.id)) {
                                selectedUsers.push(user);
                                renderGroupModal();
                            }
                        });
                    });
                }
            }

            searchInput.addEventListener('input', updateSearch);
            updateSearch();

            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedUsers = selectedUsers.filter(u => u.id !== btn.dataset.id);
                    renderGroupModal();
                });
            });

            document.getElementById('confirmGroupBtn').addEventListener('click', () => {
                const name = document.getElementById('groupName').value.trim();
                if (!name) { alert('Введите название'); return; }
                if (selectedUsers.length === 0) { alert('Выберите участников'); return; }
                const participants = selectedUsers.map(u => u.id);
                const participantNames = selectedUsers.map(u => u.name);
                participantNames.push(state.user.name);
                participants.push(state.user.id);
                if (createChat('group', name, participants, participantNames)) closeModal();
            });
        }

        renderGroupModal();
    }

    // ======== UI HELPERS ========
    function togglePassword() {
        const input = document.getElementById('loginPassword');
        const btn = document.getElementById('togglePassword');
        if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
        else { input.type = 'password'; btn.textContent = '👁️'; }
    }

    function toggleRegPassword() {
        const input = document.getElementById('regPassword');
        const btn = document.getElementById('toggleRegPassword');
        if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
        else { input.type = 'password'; btn.textContent = '👁️'; }
    }

    function switchToCode() {
        document.getElementById('tabPassword').classList.remove('active');
        document.getElementById('tabCode').classList.add('active');
        document.getElementById('passwordForm').style.display = 'none';
        document.getElementById('codeForm').style.display = 'block';
        document.getElementById('loginError').classList.add('hidden');
    }

    function switchToPassword() {
        document.getElementById('tabCode').classList.remove('active');
        document.getElementById('tabPassword').classList.add('active');
        document.getElementById('codeForm').style.display = 'none';
        document.getElementById('passwordForm').style.display = 'block';
        document.getElementById('codeError').classList.add('hidden');
        document.getElementById('codeSuccess').classList.add('hidden');
        document.getElementById('verifyError').classList.add('hidden');
        document.getElementById('verifySection').style.display = 'none';
        document.getElementById('registerBtn').disabled = false;
        document.getElementById('registerBtn').textContent = '📧 Зарегистрироваться';
    }

    // ======== INIT ========
    document.addEventListener('DOMContentLoaded', () => {
        loadState();
        
        if (state.user) {
            state.bot.setUserName(state.user.name);
            initBot();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            renderAll();
        }

        // Tab switching
        document.getElementById('tabPassword').addEventListener('click', switchToPassword);
        document.getElementById('tabCode').addEventListener('click', switchToCode);
        document.getElementById('forgotPasswordLink').addEventListener('click', switchToCode);
        document.getElementById('backToPasswordLink').addEventListener('click', switchToPassword);

        // Login
        document.getElementById('loginPasswordBtn').addEventListener('click', loginWithPassword);
        document.getElementById('loginPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginWithPassword();
        });
        document.getElementById('togglePassword').addEventListener('click', togglePassword);

        // Register
        document.getElementById('registerBtn').addEventListener('click', registerUser);
        document.getElementById('regPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') registerUser();
        });
        document.getElementById('toggleRegPassword').addEventListener('click', toggleRegPassword);

        // Verify
        document.getElementById('verifyBtn').addEventListener('click', verifyCode);
        document.getElementById('verifyCode').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') verifyCode();
        });
        document.getElementById('resendCodeBtn').addEventListener('click', resendCode);
        document.getElementById('copyCodeBtn').addEventListener('click', copyCode);

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', logout);

        // Chat controls
        document.getElementById('backBtn').addEventListener('click', closeChat);

        // Send message
        function handleSend() {
            const input = document.getElementById('messageInput');
            if (state.pendingFile) {
                sendFileMessage();
            } else if (input.value.trim()) {
                sendMessage(input.value.trim(), null, false, null, null);
                input.value = '';
            }
        }

        document.getElementById('sendBtn').addEventListener('click', handleSend);
        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSend();
            }
        });

        // Voice
        let voicePressTimer = null;
        const voiceBtn = document.getElementById('voiceBtn');
        
        voiceBtn.addEventListener('mousedown', () => {
            voicePressTimer = setTimeout(() => {
                startVoiceRecording();
            }, 300);
        });
        voiceBtn.addEventListener('mouseup', () => {
            clearTimeout(voicePressTimer);
            if (state.isRecording) {
                stopVoiceRecording();
            }
        });
        voiceBtn.addEventListener('mouseleave', () => {
            clearTimeout(voicePressTimer);
        });
        
        voiceBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            voicePressTimer = setTimeout(() => {
                startVoiceRecording();
            }, 300);
        });
        voiceBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            clearTimeout(voicePressTimer);
            if (state.isRecording) {
                stopVoiceRecording();
            }
        });
        
        document.getElementById('voiceCancelBtn').addEventListener('click', cancelVoiceRecording);
        document.getElementById('voiceSendBtn').addEventListener('click', stopVoiceRecording);

        // Camera
        document.getElementById('cameraBtn').addEventListener('click', handleCamera);
        document.getElementById('cameraInput').addEventListener('change', (e) => {
            if (e.target.files.length) {
                const file = e.target.files[0];
                if (!file.type.startsWith('image/')) {
                    alert('Выберите изображение');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const fileData = {
                        name: file.name || 'photo.jpg',
                        size: file.size,
                        type: file.type,
                        data: ev.target.result,
                    };
                    sendMessage(null, null, false, fileData, null);
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });

        // File
        document.getElementById('fileBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFileSelect(e.target.files[0]);
            }
        });
        document.getElementById('removeFileBtn').addEventListener('click', clearFilePreview);

        // Video
        document.getElementById('videoBtn').addEventListener('click', handleVideoUpload);
        document.getElementById('videoFileInput').addEventListener('change', (e) => {
            if (e.target.files.length) {
                const file = e.target.files[0];
                if (!file.type.startsWith('video/')) {
                    alert('Выберите видео');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    sendMessage(null, ev.target.result, false, null, null);
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });

        // Circle
        document.getElementById('circleBtn').addEventListener('click', startCircleRecording);

        // Add
        document.getElementById('addBtn').addEventListener('click', showCreateMenu);

        // Modal close
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        // Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('chatView').classList.contains('open')) {
                closeChat();
            }
        });
    });
</script>
</body>
</html>
