<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tlim - тест регистрации</title>
    <style>
        body {
            background: #0e1621;
            color: #e1e9f0;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1f2c38;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
        }
        h1 {
            text-align: center;
            color: #64b5f6;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: #2b3b4a;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            outline: 1px solid #64b5f6;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #64b5f6;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            color: #0e1621;
            cursor: pointer;
        }
        button:hover {
            background: #4da3e0;
        }
        .error {
            color: #f28b82;
            margin-top: 10px;
            text-align: center;
        }
        .success {
            color: #7cff9e;
            margin-top: 10px;
            text-align: center;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tabs button {
            flex: 1;
            padding: 10px;
            background: #1f2c38;
            border: none;
            border-radius: 12px;
            color: #8e9fb1;
            cursor: pointer;
            font-size: 15px;
        }
        .tabs button.active {
            background: #2b5278;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Tlim</h1>
        <div class="tabs">
            <button class="active" id="tabLogin">🔑 Вход</button>
            <button id="tabRegister">📧 Регистрация</button>
        </div>

        <!-- Вход -->
        <div id="loginForm">
            <input type="text" id="loginName" placeholder="Имя пользователя" />
            <input type="password" id="loginPass" placeholder="Пароль" />
            <button id="loginBtn">Войти</button>
            <div id="loginMsg" class="error"></div>
        </div>

        <!-- Регистрация -->
        <div id="registerForm" style="display:none;">
            <input type="text" id="regName" placeholder="Имя пользователя" />
            <input type="email" id="regEmail" placeholder="Почта" />
            <input type="password" id="regPass" placeholder="Пароль" />
            <button id="regBtn">Зарегистрироваться</button>
            <div id="regMsg" class="error"></div>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';

        // Вкладки
        document.getElementById('tabLogin').onclick = () => {
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabRegister').classList.remove('active');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        };
        document.getElementById('tabRegister').onclick = () => {
            document.getElementById('tabRegister').classList.add('active');
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };

        // РЕГИСТРАЦИЯ
        document.getElementById('regBtn').onclick = async () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPass').value.trim();
            const msg = document.getElementById('regMsg');

            if (!name || !email || !password) {
                msg.textContent = '❌ Заполните все поля';
                msg.className = 'error';
                return;
            }

            try {
                const res = await fetch(API + '/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                
                if (data.error) {
                    msg.textContent = '❌ ' + data.error;
                    msg.className = 'error';
                } else {
                    msg.textContent = '✅ Пользователь создан! Можете войти.';
                    msg.className = 'success';
                    document.getElementById('regName').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPass').value = '';
                }
            } catch (e) {
                msg.textContent = '❌ Ошибка соединения с сервером';
                msg.className = 'error';
                console.error(e);
            }
        };

        // ВХОД
        document.getElementById('loginBtn').onclick = async () => {
            const name = document.getElementById('loginName').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const msg = document.getElementById('loginMsg');

            if (!name || !password) {
                msg.textContent = '❌ Введите имя и пароль';
                msg.className = 'error';
                return;
            }

            try {
                const res = await fetch(API + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password })
                });
                const data = await res.json();
                
                if (data.error) {
                    msg.textContent = '❌ ' + data.error;
                    msg.className = 'error';
                } else {
                    msg.textContent = '✅ Вход выполнен! Добро пожаловать, ' + data.user.name + '!';
                    msg.className = 'success';
                    document.getElementById('loginName').value = '';
                    document.getElementById('loginPass').value = '';
                }
            } catch (e) {
                msg.textContent = '❌ Ошибка соединения с сервером';
                msg.className = 'error';
                console.error(e);
            }
        };
    </script>
</body>
</html>
